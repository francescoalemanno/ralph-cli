name: Build Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-musl
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_name: ralph-cli-x86_64-unknown-linux-musl.tar.gz
            strip_command: strip
          - name: linux-aarch64-musl
            runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive_name: ralph-cli-aarch64-unknown-linux-musl.tar.gz
            strip_command: llvm-strip
          - name: macos-x86_64
            runner: macos-13
            target: x86_64-apple-darwin
            archive_name: ralph-cli-x86_64-apple-darwin.tar.gz
            strip_command: strip -x
          - name: macos-aarch64
            runner: macos-14
            target: aarch64-apple-darwin
            archive_name: ralph-cli-aarch64-apple-darwin.tar.gz
            strip_command: strip -x

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Zig
        if: matrix.target == 'aarch64-unknown-linux-musl'
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install --locked cargo-zigbuild

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --locked --release -p ralph-cli --target "${{ matrix.target }}"

      - name: Build Linux arm64 musl release binary
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo zigbuild --locked --release -p ralph-cli --target "${{ matrix.target }}"

      - name: Prepare archive contents
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/ralph" "dist/ralph"
          ${{ matrix.strip_command }} "dist/ralph" || true
          cp README.md LICENSE dist/
          tar -C dist -czf "${{ matrix.archive_name }}" ralph README.md LICENSE

      - name: Upload archive to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}
          generate_release_notes: true
