version = 1
start = "dispatch"

[[nodes]]
id = "dispatch"
kind = "decision"

[[nodes.rules]]
when = { kind = "selected_action", action = "interview" }
goto = "interview"

[[nodes.rules]]
when = { kind = "selected_action", action = "rebuild" }
goto = "rebuild"

[[nodes.rules]]
when = { kind = "selected_action", action = "rebase" }
goto = "task_driven_rebase"

[[nodes.rules]]
when = { kind = "selected_action", action = "build" }
goto = "task_driven_build"

[[nodes.rules]]
when = { kind = "missing", path = "{{derived_file}}" }
goto = "task_driven_rebase"

[[nodes.rules]]
when = { kind = "missing_var", key = "goal_hash" }
goto = "task_driven_rebase"

[[nodes.rules]]
when = { kind = "path_hash_changed", path = "{{goal_file}}", key = "goal_hash" }
goto = "task_driven_paused"

[[nodes.rules]]
when = { kind = "var_equals", key = "phase", value = "build" }
goto = "task_driven_build"

[[nodes.rules]]
when = { kind = "path_hash_changed", path = "{{derived_file}}", key = "derived_hash" }
goto = "task_driven_build"

[[nodes.rules]]
goto = "task_driven_paused"

[[nodes]]
id = "task_driven_rebase"
kind = "prompt"
prompt = "builtin://prompts/task_driven/rebase.md"
on_completed = "record_goal_hash"
on_max_iterations = "task_driven_paused"

[[nodes]]
id = "record_goal_hash"
kind = "action"
action = "set_path_hash_var"
on_success = "record_derived_hash"

[nodes.args]
key = "goal_hash"
path = "{{goal_file}}"

[[nodes]]
id = "record_derived_hash"
kind = "action"
action = "set_path_hash_var"
on_success = "mark_build_phase"

[nodes.args]
key = "derived_hash"
path = "{{derived_file}}"

[[nodes]]
id = "mark_build_phase"
kind = "action"
action = "set_var"
on_success = "finish_after_rebase"

[nodes.args]
key = "phase"
value = "build"

[[nodes]]
id = "finish_after_rebase"
kind = "finish"
summary = "Backlog rebase complete."
status = "completed"

[[nodes]]
id = "task_driven_build"
kind = "prompt"
prompt = "builtin://prompts/task_driven/build.md"
on_completed = "record_derived_hash_after_build"
on_max_iterations = "task_driven_paused"

[[nodes]]
id = "record_derived_hash_after_build"
kind = "action"
action = "set_path_hash_var"
on_success = "clear_build_phase"

[nodes.args]
key = "derived_hash"
path = "{{derived_file}}"

[[nodes]]
id = "clear_build_phase"
kind = "action"
action = "clear_var"
on_success = "task_driven_paused"

[nodes.args]
key = "phase"

[[nodes]]
id = "task_driven_paused"
kind = "pause"
message = "The backlog is paused. Edit the goal or choose an action."
summary = "Paused."

[[nodes.actions]]
id = "build"
label = "Build current backlog"
shortcut = "B"
goto = "task_driven_build"

[[nodes.actions]]
id = "rebase"
label = "Rebase backlog"
shortcut = "G"
goto = "task_driven_rebase"

[[nodes.actions]]
id = "rebuild"
label = "Rebuild from scratch"
shortcut = "X"
confirm_title = "Rebuild From Scratch"
confirm_message = "Archive the current derived workflow artifacts for `{target}` and rebuild from GOAL.md? This replaces the active backlog."
goto = "rebuild"

[[nodes.actions]]
id = "interview"
label = "Interview goal"
shortcut = "I"
goto = "interview"

[[nodes]]
id = "interview"
kind = "interactive"
prompt = "builtin://prompts/task_driven/goal_interview.md"
on_completed = "post_interview"
on_failed = "task_driven_paused"

[[nodes]]
id = "post_interview"
kind = "decision"

[[nodes.rules]]
when = { kind = "path_hash_changed", path = "{{goal_file}}", key = "goal_hash" }
goto = "task_driven_rebase"

[[nodes.rules]]
goto = "task_driven_paused"

[[nodes]]
id = "rebuild"
kind = "action"
action = "archive_paths"
on_success = "task_driven_rebase"

[nodes.args]
files = ["{{derived_file}}", "{{journal_file}}"]
dirs = []
archive_root = ".history"
prefix = "{{archive_prefix}}"
