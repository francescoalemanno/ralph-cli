version = 1
start = "dispatch"

[[nodes]]
id = "dispatch"
kind = "decision"

[[nodes.rules]]
when = { kind = "missing", path = "{{derived_file}}" }
goto = "plan_driven_plan"

[[nodes.rules]]
when = { kind = "missing_var", key = "goal_hash" }
goto = "plan_driven_plan"

[[nodes.rules]]
when = { kind = "path_hash_changed", path = "{{goal_file}}", key = "goal_hash" }
goto = "plan_driven_paused"

[[nodes.rules]]
goto = "plan_driven_build"

[[nodes]]
id = "plan_driven_plan"
kind = "prompt"
prompt = "builtin://prompts/plan_driven/rebase.md"
on_completed = "record_goal_hash"
on_max_iterations = "plan_driven_paused"

[[nodes]]
id = "record_goal_hash"
kind = "action"
action = "set_path_hash_var"
on_success = "record_derived_hash"

[nodes.args]
key = "goal_hash"
path = "{{goal_file}}"

[[nodes]]
id = "record_derived_hash"
kind = "action"
action = "set_path_hash_var"
on_success = "finish_after_plan"

[nodes.args]
key = "derived_hash"
path = "{{derived_file}}"

[[nodes]]
id = "finish_after_plan"
kind = "finish"
summary = "Planning complete."
status = "completed"

[[nodes]]
id = "plan_driven_build"
kind = "prompt"
prompt = "builtin://prompts/plan_driven/build.md"
on_completed = "record_derived_hash_after_build"
on_max_iterations = "plan_driven_paused"

[[nodes]]
id = "record_derived_hash_after_build"
kind = "action"
action = "set_path_hash_var"
on_success = "plan_driven_paused"

[nodes.args]
key = "derived_hash"
path = "{{derived_file}}"

[[nodes]]
id = "plan_driven_paused"
kind = "pause"
message = "The plan is paused. Edit the goal or choose an action."
summary = "Paused."

[[nodes.actions]]
id = "build"
label = "Build current plan"
shortcut = "B"
goto = "plan_driven_build"

[[nodes.actions]]
id = "rebase"
label = "Rebase plan"
shortcut = "G"
goto = "plan_driven_plan"

[[nodes.actions]]
id = "rebuild"
label = "Rebuild from scratch"
shortcut = "X"
goto = "rebuild"

[[nodes.actions]]
id = "interview"
label = "Interview goal"
shortcut = "I"
goto = "interview"

[[nodes]]
id = "interview"
kind = "interactive"
prompt = "builtin://prompts/plan_driven/goal_interview.md"
on_completed = "post_interview"
on_failed = "plan_driven_paused"

[[nodes]]
id = "post_interview"
kind = "decision"

[[nodes.rules]]
when = { kind = "path_hash_changed", path = "{{goal_file}}", key = "goal_hash" }
goto = "plan_driven_plan"

[[nodes.rules]]
goto = "plan_driven_paused"

[[nodes]]
id = "rebuild"
kind = "action"
action = "archive_paths"
on_success = "plan_driven_plan"

[nodes.args]
files = ["{{derived_file}}", "{{journal_file}}"]
dirs = ["{{specs_dir}}"]
archive_root = ".history"
prefix = "{{archive_prefix}}"
