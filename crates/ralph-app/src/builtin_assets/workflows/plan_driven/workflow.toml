version = 1
id = "plan_driven"
name = "Plan Driven"
description = "A durable plan/build workflow driven from GOAL.md."
scaffold = "plan_driven"
default_entrypoint = "main"

[params.goal_file]
default = "GOAL.md"

[params.derived_file]
default = "plan.toml"

[params.specs_dir]
default = "specs"

[params.journal_file]
default = "journal.txt"

[params.archive_prefix]
default = "goal_rebuild"

[[entrypoints]]
id = "main"
kind = "flow"
flow = "builtin://flows/plan_driven.toml"
edit_path = "{{goal_file}}"

[[materialize]]
kind = "file"
path = "{{goal_file}}"
source = "self://templates/GOAL.md"

[[materialize]]
kind = "dir"
path = "{{specs_dir}}"
