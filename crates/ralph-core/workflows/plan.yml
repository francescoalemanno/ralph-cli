# AUTOGENERATED DO NOT MODIFY
version: 1
workflow_id: plan
title: Plan
description: "Create an implementation plan through a host-mediated planning loop: explore, ask one clarifying question at a time, write a draft plan file, and let Ralph collect review feedback before final acceptance."
entrypoint: plan
options:
  plans-dir:
    help: Directory where accepted plan files should be written.
    default: docs/plans
    value_name: DIR
request:
  runtime:
    argv: true
    file_flag: true
prompts:
  plan:
    title: Planner
    fallback-route: plan
    prompt: |
      {ralph-skill-emit}
      You are helping create an implementation plan for:
      ```
      {ralph-request}
      ```

      The accepted plan file must be written under `{ralph-option:plans-dir}`.

      Ralph stores planning progress in the current run WAL and keeps the current draft in the plan file you emit with `planning-target-path`.

      Before you do ANY exploration, ask ANY question, or emit ANY payload, execute these exact commands in order to read the planning state. If a payload does not exist yet, treat the output as empty:
      1. `"$RALPH_BIN" get --channel host planning-progress 2>/dev/null || true`
      2. `"$RALPH_BIN" get planning-target-path 2>/dev/null || true`
      3. If step 2 returns a non-empty path and that file exists, read that file in full immediately.

      CRITICAL:
      - those reads are the canonical planning-state inputs for this iteration
      - if planning progress or a current draft file already exists, you MUST use that state before deciding what to do next

      ## Step 0: Check for Existing Plan

      FIRST, check whether a plan file already exists under `{ralph-option:plans-dir}` that already covers this request.
      If a matching plan already exists:
      - emit event `loop-stop:ok` with body `matching plan already exists`
      - stop immediately

      ## Step 1: Read Planning Progress

      Use the planning progress and current draft file to understand:
      - what questions you already asked
      - what answers the user already provided
      - what draft review feedback the user already gave
      - what exact draft and target path the latest review feedback refers to

      Do not repeat answered questions.

      If a latest `planning-target-path` already exists and that file exists, treat that file as the current working draft.
      That rule applies after ANY user interaction, including after a clarifying question has been answered.
      Do not discard an existing draft and start over unless the feedback or new answer genuinely requires a full rewrite.
      If the planning progress or current draft file is non-empty, you MUST account for it before emitting a new `planning-question` or `planning-target-path`.

      ## Step 2: Explore the Codebase

      If this is the first iteration or the progress is still sparse:
      - inspect the relevant code
      - identify the files, patterns, and constraints that matter
      - decide what you can determine yourself without asking

      ## Step 3: Ask Clarifying Questions Only When Needed

      If you genuinely need user input to create a good plan, emit exactly one payload named `planning-question` with this exact body shape:

      Question: Your question here?
      Options:
      - Option 1
      - Option 2
      - Option 3
      Context: Why this question matters

      Rules for questions:
      - ask ONE question at a time
      - provide 2-4 concrete options
      - only ask about architecture, scope, or user preferences you cannot infer safely
      - do not ask about implementation details you can choose yourself
      - keep `Context:` to one short line
      - if a draft already exists, ask only the minimum question needed to refine that existing draft

      After emitting `planning-question`, stop immediately. Do not continue. Do not emit loop-control events in the same response.

      ## Step 3.5: Write The Draft File Before Emitting The Path

      When you have enough information to create a good plan:
      - if a latest `planning-target-path` already exists, update that draft file instead of recreating it from scratch
      1. choose the final project-relative target path under `{ralph-option:plans-dir}` in the form `YYYY-MM-DD-slug.md`
      2. write the full markdown plan draft to that exact file
      3. emit that exact relative path as payload `planning-target-path`
      4. stop immediately

      CRITICAL:
      - always write the draft file before emitting `planning-target-path`
      - always emit `planning-target-path` when you want Ralph to review a draft, even if the filename did not change
      - do not emit loop-control events in the same response as `planning-target-path`
      - Ralph will read the draft from the file you wrote, show it to the user, and collect `accept` / `revise` / `reject`

      ## Draft Review Handling

      If the planning progress shows `Decision: revise`:
      - first examine the latest review feedback and the latest draft file you just read
      - if the feedback asks for missing user choices you cannot infer safely (for example library, stack, architecture, or scope preferences), emit exactly one `planning-question` instead of a new draft
      - revise the latest draft file you just read; do not invent a fresh unrelated draft
      - reuse the latest `planning-target-path` unless the feedback requires a different filename
      - apply the review feedback directly and preserve unchanged sections of the draft where possible
      - if the filename changes, write the revised draft to the new file under `{ralph-option:plans-dir}`
      - emit `planning-target-path` after the revised file is written
      - stop immediately

      If the planning progress shows `Decision: revise`, do not emit a fresh draft that ignores the existing review feedback or the latest draft file state.

      If the planning progress shows `Decision: accept` or `Decision: reject`, do not continue planning. Ralph will end the workflow externally.

      ## Plan Structure

      The draft must use this structure:

      ---
      # <Title>

      ## Overview
      <Brief description of what will be implemented>

      ## Context
      - Files involved: <list relevant files>
      - Related patterns: <existing patterns to follow>
      - Dependencies: <external dependencies if any>

      ## Development Approach
      - Complete each task fully before moving to the next
      - **CRITICAL: every task that changes code MUST include new/updated tests**
      - **CRITICAL: all tests must pass before starting the next task**
      - Validation must pass before the next task starts

      ## Implementation Steps

      ### Task 1: <Title>

      **Files:**
      - Modify: `path/to/file`
      - Create: `path/to/new_file` (if any)

      - [ ] first implementation step
      - [ ] second implementation step
      - [ ] write tests for this task
      - [ ] run the relevant validation commands

      ### Task 2: <Title>
      ...

      ### Task N: Verify acceptance criteria
      - [ ] run the full relevant test suite
      - [ ] run the relevant linting or static checks

      ### Task N+1: Update documentation
      - [ ] update user-facing docs if behavior changed
      - [ ] update internal docs or patterns if needed
      ---

      ## Validation Before Drafting

      Before emitting `planning-target-path`, verify:

      **Scope & Feasibility:**
      - tasks are right-sized and executable (aim for 3-7 items; adjust if needed for coherence)
      - each task focuses on one component or closely related files
      - task dependencies are linear (no circular deps)
      - external dependencies are minimized and clearly noted

      **Completeness:**
      - all requirements from the request are covered
      - each task specifies file paths where known
      - each task that modifies code includes test items
      - task section checkboxes are automatable by the agent (no manual testing, deployment, or external verification items as `- [ ]` inside Task sections)

      **Simplicity (YAGNI):**
      - no unnecessary abstractions
      - no "future-proofing" features not in the original request
      - no backwards compatibility or fallbacks unless explicitly requested
      - new files only for genuinely new components, not minor additions
      - no over-engineered patterns when simpler solutions work

      - the path in `planning-target-path` stays under `{ralph-option:plans-dir}`

      If validation fails, fix the plan file before emitting `planning-target-path`.

      CRITICAL RULES:
      - do not ask “should I proceed?”
      - do not use natural-language questions outside the structured `planning-question` payload
      - when you emit `planning-question` or `planning-target-path`, stop immediately
      - plain text response formatting is fine; the plan file content must be markdown
