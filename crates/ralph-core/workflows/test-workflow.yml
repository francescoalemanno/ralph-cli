version: 1
workflow_id: test-workflow
title: Test Workflow
description: Internal end-to-end workflow for exercising Ralph loop control and event emission.
hidden: true
max_iterations: 14
entrypoint: init
prompts:
  init:
    title: Init
    fallback-route: no-route-error
    prompt: |
      set -eu
      state_dir="$RALPH_RUN_DIR/state"
      log_file="$RALPH_RUN_DIR/worklog.txt"
      mkdir -p "$state_dir"
      printf '%s\n' 1 > "$state_dir/round.txt"
      : > "$log_file"
      echo "init workflow state in $RALPH_RUN_DIR"
      printf '%s\n' "init" >> "$log_file"
      "$RALPH_BIN" payload test-phase "init"
      "$RALPH_BIN" payload loop-route "alpha"
  alpha:
    title: Alpha
    fallback-route: no-route-error
    prompt: |
      set -eu
      state_dir="$RALPH_RUN_DIR/state"
      log_file="$RALPH_RUN_DIR/worklog.txt"
      round=$(cat "$state_dir/round.txt")
      echo "alpha round $round"
      printf '%s\n' "alpha:$round" >> "$log_file"
      printf '%s\n' "alpha artifact round $round" > "$state_dir/alpha-$round.txt"
      "$RALPH_BIN" payload test-phase "alpha:$round"
      "$RALPH_BIN" payload loop-route "beta"
  beta:
    title: Beta
    fallback-route: no-route-error
    prompt: |
      set -eu
      state_dir="$RALPH_RUN_DIR/state"
      log_file="$RALPH_RUN_DIR/worklog.txt"
      round=$(cat "$state_dir/round.txt")
      prev_phase=$("$RALPH_BIN" get test-phase)
      test "$prev_phase" = "alpha:$round"
      echo "beta round $round"
      printf '%s\n' "beta:$round" >> "$log_file"
      printf '%s\n' "beta artifact round $round" > "$state_dir/beta-$round.txt"
      "$RALPH_BIN" payload test-phase "beta:$round"
      "$RALPH_BIN" payload loop-route "gamma"
  gamma:
    title: Gamma
    fallback-route: no-route-error
    prompt: |
      set -eu
      state_dir="$RALPH_RUN_DIR/state"
      log_file="$RALPH_RUN_DIR/worklog.txt"
      round=$(cat "$state_dir/round.txt")
      prev_phase=$("$RALPH_BIN" get test-phase)
      test "$prev_phase" = "beta:$round"
      echo "gamma round $round"
      printf '%s\n' "gamma:$round" >> "$log_file"
      printf '%s\n' "gamma artifact round $round" > "$state_dir/gamma-$round.txt"
      "$RALPH_BIN" payload test-phase "gamma:$round"
      if [ "$round" -ge 4 ]; then
        "$RALPH_BIN" payload loop-route "finalize"
      else
        next_round=$((round + 1))
        printf '%s\n' "$next_round" > "$state_dir/round.txt"
        "$RALPH_BIN" payload loop-route "alpha"
      fi
  finalize:
    title: Finalize
    fallback-route: no-route-error
    prompt: |
      set -eu
      state_dir="$RALPH_RUN_DIR/state"
      log_file="$RALPH_RUN_DIR/worklog.txt"
      round=$(cat "$state_dir/round.txt")
      prev_phase=$("$RALPH_BIN" get test-phase)
      test "$prev_phase" = "gamma:$round"
      echo "finalize after $round rounds"
      printf '%s\n' "finalize:$round" >> "$log_file"
      entries=$(wc -l < "$log_file" | tr -d '[:space:]')
      {
        printf 'rounds=%s\n' "$round"
        printf 'entries=%s\n' "$entries"
      } > "$RALPH_RUN_DIR/summary.txt"
      "$RALPH_BIN" payload test-phase "finalize:$round"
      "$RALPH_BIN" payload loop-stop:ok "completed $round coordinated rounds"
