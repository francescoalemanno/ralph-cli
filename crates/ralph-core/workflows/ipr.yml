version: 1
workflow_id: ipr
title: IPR
description: "Implement then parallel review: execute one markdown task section per pass, run multi-agent review, and optionally finalize. Branch setup and completed-plan moves remain external."
entrypoint: task
options:
  plan-file:
    help: Markdown plan file to execute.
    value_name: FILE
  base-ref:
    help: Base ref for review diffs and finalize rebases.
    default: main
    value_name: REF
  finalize-enabled:
    help: Set to true to run the best-effort finalize step after review passes.
    default: "false"
    value_name: BOOL
prompts:
  task:
    title: Task executor
    is_interactive: false
    fallback-route: task
    prompt: |
      {ralph-skill-emit}
      Read the plan file at `{ralph-option:plan-file}`. Find the FIRST Task section (`### Task N:` or `### Iteration N:`) that has uncompleted checkboxes (`[ ]`).

      If the plan file is missing, unreadable, or too malformed to identify the current task truthfully, {ralph-stop:error:plan-file-unreadable} and stop immediately.

      If NO Task section has `[ ]` but `## Success criteria`, `## Overview`, or `## Context` still has `[ ]`: either satisfy those items and mark them `[x]` if actionable, or {ralph-route:review-first-fanout} and stop if they are verification-only items such as manual testing, deployment, or external checks. Do not loop indefinitely when the remaining items are not automatable by you.

      If a Task section has `[ ]` checkboxes you cannot complete because they require manual testing, deployment verification, or external systems: mark them `[x]` with a short note such as `[x] manual test (skipped - not automatable)` and proceed. Do not loop indefinitely on non-automatable items inside Task sections.

      CRITICAL CONSTRAINT: Complete ONE Task section per iteration.
      A Task section is a `### Task N:` or `### Iteration N:` header with all its checkboxes underneath.
      Complete ALL checkboxes in that section, then STOP.
      Do NOT continue to the next section in the same pass.

      Before starting work, output a brief overview explaining:
      - which task number you picked and its title
      - what the task will accomplish
      - the key files or components involved

      Implementation rules:
      - Read the plan's Overview and Context sections to understand the work.
      - Implement ALL items in the current Task section.
      - Write tests for the implementation.
      - Run the test and lint commands specified in the plan.
      - Fix failures and repeat until validation passes.

      Completion rules after validation passes:
      - Edit `{ralph-option:plan-file}` and change `[ ]` to `[x]` for each checkbox you completed in the current Task section.
      - If Task sections are complete but `## Success criteria`, `## Overview`, or `## Context` has `[ ]` items that the implementation now satisfies, mark them `[x]` in the same edit.
      - Commit all changes, including the updated plan, with message: `feat: <brief task description>`.
      - Check whether any `[ ]` checkboxes remain in Task sections.
      - If NO more `[ ]` checkboxes remain in Task sections, {ralph-route:review-first-fanout} and stop.
      - If more Task sections still have `[ ]` checkboxes, STOP HERE and do not emit any loop-control event. The fallback route will rerun this prompt for the next task section.

      If any phase fails after reasonable fix attempts, {ralph-stop:error:task-failed}.

      OUTPUT FORMAT: No markdown tables. Plain text and simple `-` lists are fine.

  review-first-fanout:
    title: First review fanout
    is_interactive: false
    fallback-route: review-first-fix
    parallel:
      workers:
        quality:
          title: Quality review
          prompt: |
            {ralph-skill-emit}
            Review code for bugs, security issues, correctness problems, and unnecessary complexity.

            Code review of: implementation of plan at `{ralph-option:plan-file}`

            Run both commands to understand what changed:
            - `git log {ralph-option:base-ref}..HEAD --oneline`
            - `git diff {ralph-option:base-ref}...HEAD`
            - `git diff --stat {ralph-option:base-ref}...HEAD`

            Then read the actual source files in full context.

            Focus on:
            - logic errors
            - edge cases
            - error handling
            - resource management
            - concurrency issues
            - input validation and security issues
            - unnecessary abstraction or over-engineering when a simpler solution would work

            Report problems only. No positive observations.

            Emit exactly one payload named `review-findings` using plain text markdown with this shape:

            Reviewer: quality
            Scope: bugs, security, correctness, simplicity

            Findings:
            - [critical|major|minor] path/to/file:line
              Issue: short description
              Impact: why it matters
              Fix: concrete change to make

            Overall:
            - N findings

            If there are no problems, use:
            Findings:
            - none
            Overall:
            - 0 findings

            Do not emit loop-control events.
        implementation:
          title: Implementation review
          prompt: |
            {ralph-skill-emit}
            Review whether the implementation actually achieves the stated goal of the plan.

            Code review of: implementation of plan at `{ralph-option:plan-file}`

            Run both commands to understand what changed:
            - `git log {ralph-option:base-ref}..HEAD --oneline`
            - `git diff {ralph-option:base-ref}...HEAD`
            - `git diff --stat {ralph-option:base-ref}...HEAD`

            Then read the actual source files in full context.

            Focus on:
            - requirement coverage
            - correctness of the chosen approach
            - wiring and integration
            - completeness
            - logic flow
            - edge cases

            Report problems only. No positive observations.

            Emit exactly one payload named `review-findings` using plain text markdown with this shape:

            Reviewer: implementation
            Scope: goal coverage, wiring, completeness, logic flow

            Findings:
            - [critical|major|minor] path/to/file:line
              Issue: short description
              Impact: why it prevents the goal
              Fix: concrete change to make

            Overall:
            - N findings

            If there are no problems, use:
            Findings:
            - none
            Overall:
            - 0 findings

            Do not emit loop-control events.
        testing:
          title: Testing review
          prompt: |
            {ralph-skill-emit}
            Review test coverage and test quality for the changed code.

            Code review of: implementation of plan at `{ralph-option:plan-file}`

            Run both commands to understand what changed:
            - `git log {ralph-option:base-ref}..HEAD --oneline`
            - `git diff {ralph-option:base-ref}...HEAD`
            - `git diff --stat {ralph-option:base-ref}...HEAD`

            Then read the changed tests and the related implementation files in full context.

            Focus on:
            - missing tests
            - untested error paths
            - weak assertions
            - fake tests that do not verify behavior
            - missing edge-case coverage
            - test independence

            Report problems only. No positive observations.

            Emit exactly one payload named `review-findings` using plain text markdown with this shape:

            Reviewer: testing
            Scope: coverage, test quality, edge cases

            Findings:
            - [critical|major|minor] path/to/file:line
              Issue: short description
              Impact: what bug could slip through
              Fix: concrete change to make

            Overall:
            - N findings

            If there are no problems, use:
            Findings:
            - none
            Overall:
            - 0 findings

            Do not emit loop-control events.
        simplification:
          title: Simplification review
          prompt: |
            {ralph-skill-emit}
            Detect over-engineered or overcomplicated code that could be simplified without losing required behavior.

            Code review of: implementation of plan at `{ralph-option:plan-file}`

            Run both commands to understand what changed:
            - `git log {ralph-option:base-ref}..HEAD --oneline`
            - `git diff {ralph-option:base-ref}...HEAD`
            - `git diff --stat {ralph-option:base-ref}...HEAD`

            Then read the actual source files in full context.

            Focus on:
            - excessive abstraction layers
            - premature generalization
            - unnecessary indirection
            - unused extension points
            - unnecessary fallbacks
            - premature optimization

            Report problems only. No positive observations.

            Emit exactly one payload named `review-findings` using plain text markdown with this shape:

            Reviewer: simplification
            Scope: unnecessary complexity, over-engineering

            Findings:
            - [major|minor] path/to/file:line
              Issue: short description
              Impact: why the complexity is harmful
              Fix: simpler approach to use instead

            Overall:
            - N findings

            If there are no problems, use:
            Findings:
            - none
            Overall:
            - 0 findings

            Do not emit loop-control events.
        documentation:
          title: Documentation review
          prompt: |
            {ralph-skill-emit}
            Review whether the changed code requires documentation updates.

            Code review of: implementation of plan at `{ralph-option:plan-file}`

            Run both commands to understand what changed:
            - `git log {ralph-option:base-ref}..HEAD --oneline`
            - `git diff {ralph-option:base-ref}...HEAD`
            - `git diff --stat {ralph-option:base-ref}...HEAD`

            Then read the actual source files, `README.md`, and other relevant docs in full context.

            Focus on:
            - missing README updates for new features, flags, configuration, APIs, or changed behavior
            - missing internal documentation updates for new patterns, commands, or architecture
            - plan file drift that should be corrected while addressing documentation gaps

            Report problems only. No positive observations.

            Emit exactly one payload named `review-findings` using plain text markdown with this shape:

            Reviewer: documentation
            Scope: README, internal docs, plan alignment

            Findings:
            - [major|minor] path/to/file:line
              Issue: short description
              Impact: what remains undocumented or misleading
              Fix: concrete documentation change to make

            Overall:
            - N findings

            If there are no problems, use:
            Findings:
            - none
            Overall:
            - 0 findings

            Do not emit loop-control events.

  review-first-fix:
    title: First review fix pass
    is_interactive: false
    fallback-route: no-route-error
    prompt: |
      {ralph-skill-emit}
      Comprehensive code review fix pass for: implementation of plan at `{ralph-option:plan-file}`

      Step 1: get branch context.
      Run both commands to understand what was done:
      - `git log {ralph-option:base-ref}..HEAD --oneline`
      - `git diff {ralph-option:base-ref}...HEAD`

      Step 2: collect findings from all five review channels.
      Read the latest payload from each channel:
      - `"$RALPH_BIN" get --channel quality review-findings`
      - `"$RALPH_BIN" get --channel implementation review-findings`
      - `"$RALPH_BIN" get --channel testing review-findings`
      - `"$RALPH_BIN" get --channel simplification review-findings`
      - `"$RALPH_BIN" get --channel documentation review-findings`

      If a channel has no `review-findings` payload, treat it as:
      - Reviewer: <channel>
      - Findings:
        - none
      - Overall:
        - 0 findings

      Step 3: collect, deduplicate, verify, and fix findings.
      - Merge findings from all channels.
      - Same file and same issue should be merged.
      - For EACH reported issue, read the actual code at the cited location, inspect surrounding context, and verify whether the issue is real.
      - Classify each issue as CONFIRMED or FALSE POSITIVE.
      - Pre-existing issues such as linter errors or failed tests should also be fixed. Do not reject them just because they existed before this branch.
      - Fix all CONFIRMED issues, including bugs, tests, smells, simplifications, and documentation.
      - Run tests and linter after fixes. All tests must pass and all linter issues must be resolved.
      - If you fixed at least one issue, commit with message: `fix: address code review findings`.

      Routing:
      - If issues were found but you cannot fix them after reasonable effort, {ralph-stop:error:review-first-failed}.
      - Otherwise {ralph-route:review-second-fanout} and stop. This includes both cases where you fixed issues and cases where no confirmed issues were found.

      OUTPUT FORMAT: No markdown tables. Plain text and simple `-` lists are fine.

  review-second-fanout:
    title: Second review fanout
    is_interactive: false
    fallback-route: review-second-fix
    parallel:
      workers:
        quality:
          title: Critical-major quality review
          prompt: |
            {ralph-skill-emit}
            Review code only for critical and major bugs, security issues, and correctness problems.

            Second code review pass of: implementation of plan at `{ralph-option:plan-file}`

            Run both commands to understand what changed:
            - `git log {ralph-option:base-ref}..HEAD --oneline`
            - `git diff {ralph-option:base-ref}...HEAD`
            - `git diff --stat {ralph-option:base-ref}...HEAD`

            Then read the actual source files in full context.

            Ignore style issues and minor suggestions.
            Report problems only. No positive observations.

            Emit exactly one payload named `review-findings` using plain text markdown with this shape:

            Reviewer: quality
            Scope: critical and major correctness, security, reliability

            Findings:
            - [critical|major] path/to/file:line
              Issue: short description
              Impact: why it matters
              Fix: concrete change to make

            Overall:
            - N findings

            If there are no problems, use:
            Findings:
            - none
            Overall:
            - 0 findings

            Do not emit loop-control events.
        implementation:
          title: Critical-major implementation review
          prompt: |
            {ralph-skill-emit}
            Review whether any critical or major requirement-coverage or integration issues remain.

            Second code review pass of: implementation of plan at `{ralph-option:plan-file}`

            Run both commands to understand what changed:
            - `git log {ralph-option:base-ref}..HEAD --oneline`
            - `git diff {ralph-option:base-ref}...HEAD`
            - `git diff --stat {ralph-option:base-ref}...HEAD`

            Then read the actual source files in full context.

            Ignore style issues and minor suggestions.
            Report problems only. No positive observations.

            Emit exactly one payload named `review-findings` using plain text markdown with this shape:

            Reviewer: implementation
            Scope: critical and major goal coverage, integration, completeness

            Findings:
            - [critical|major] path/to/file:line
              Issue: short description
              Impact: why it blocks the intended behavior
              Fix: concrete change to make

            Overall:
            - N findings

            If there are no problems, use:
            Findings:
            - none
            Overall:
            - 0 findings

            Do not emit loop-control events.

  review-second-fix:
    title: Second review evaluation
    is_interactive: false
    fallback-route: no-route-error
    prompt: |
      {ralph-skill-emit}
      Critical and major review evaluation pass for: implementation of plan at `{ralph-option:plan-file}`

      Step 1: get branch context.
      Run both commands:
      - `git log {ralph-option:base-ref}..HEAD --oneline`
      - `git diff {ralph-option:base-ref}...HEAD`

      Step 2: read the latest findings from the second-pass review channels.
      Read:
      - `"$RALPH_BIN" get --channel quality review-findings`
      - `"$RALPH_BIN" get --channel implementation review-findings`

      If a channel has no `review-findings` payload, treat it as:
      - Reviewer: <channel>
      - Findings:
        - none
      - Overall:
        - 0 findings

      Step 3: verify and act on findings.
      - Verify each reported issue against the actual code.
      - Keep only real critical or major issues.
      - Pre-existing issues such as linter errors or failed tests should also be fixed. Do not reject them just because they existed before this branch.

      Routing:
      - If ZERO confirmed critical or major issues remain:
        - If `{ralph-option:finalize-enabled}` is exactly `true`, {ralph-route:finalize} and stop.
        - Otherwise {ralph-stop:ok:review-passed} and stop.
      - If confirmed critical or major issues were found and you fixed them:
        - Run tests and linter. All tests must pass and all linter issues must be resolved.
        - Commit with message: `fix: address code review findings`.
        - Then {ralph-route:review-second-fanout} and stop.
      - If confirmed issues remain but you cannot fix them after reasonable effort, {ralph-stop:error:review-second-failed}.

      OUTPUT FORMAT: No markdown tables. Plain text and simple `-` lists are fine.

  finalize:
    title: Finalize
    is_interactive: false
    fallback-route: no-route-error
    prompt: |
      {ralph-skill-emit}
      Best-effort finalize step for: implementation of plan at `{ralph-option:plan-file}`

      If `{ralph-option:finalize-enabled}` is not exactly `true`, {ralph-stop:ok:plan-complete} and stop immediately.

      Rebase your commits onto the latest `{ralph-option:base-ref}` and organize them for merge.

      Steps:
      1. Fetch latest changes: `git fetch origin`
      2. Rebase onto `{ralph-option:base-ref}`:
         - run `git rebase origin/{ralph-option:base-ref}`
         - if conflicts occur, resolve them and continue
         - if rebase fails completely, abort with `git rebase --abort`
      3. Review commit history:
         - run `git log origin/{ralph-option:base-ref}..HEAD --oneline`
         - if there are many small fix commits, consider squashing them while keeping meaningful boundaries
      4. Verify the branch is ready:
         - run the project's most relevant tests
         - run the linter if applicable

      Constraints:
      - This step is best-effort.
      - Do not discard work.
      - Do not reset the branch hard.
      - If cleanup or rebase fails, explain what happened in plain text but still finish successfully.

      Routing:
      - If finalize succeeds cleanly, {ralph-stop:ok:plan-complete-finalize-done}.
      - If finalize is only partially successful or had to be skipped after best-effort attempts, {ralph-stop:ok:plan-complete-finalize-best-effort}.

      OUTPUT FORMAT: No markdown tables. Plain text and simple `-` lists are fine.
